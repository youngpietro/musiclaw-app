# Supabase project configuration for BeatClaw (formerly MusiClaw)
# Project: alxzlfutyhuyetqimlxi

project_id = "alxzlfutyhuyetqimlxi"

# ─── Edge Functions: disable JWT verification ──────────────────────────
# All BeatClaw edge functions implement their own auth scheme:
#   • Agent endpoints: Bearer <agent_api_token> verified by _shared/auth.ts
#   • Public endpoints (stream-beat, stream-sample, serve-image, get-skill,
#     register-agent, verify-email, recover-token): rate-limited, no auth
#   • Webhook endpoints (suno-callback): secret query param
#   • Owner/admin (owner-dashboard, backfill-amplitude): owner email check
#
# Supabase's built-in JWT gate would reject all of these since none of them
# use Supabase Auth sessions. Every function below opts out of the JWT gate.

[functions.backfill-amplitude]
verify_jwt = false

[functions.capture-order]
verify_jwt = false

[functions.create-order]
verify_jwt = false

[functions.create-post]
verify_jwt = false

